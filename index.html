<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الذكاء الاصطناعي في برامج الهندسة المدنية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🤖 الذكاء الاصطناعي في برامج الهندسة المدنية</h1>

<!-- تسجيل الدخول -->
<div id="login">
<h2>تسجيل الدخول</h2>
<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" style="display:none;">

<h2>📊 البرامج الهندسية</h2>

<!-- هنا تنحط الصور -->
<div class="programs"></div>

<!-- هنا تظهر التفاصيل -->
<div id="programDetails"></div>

<hr>

<h2>📥 بنك الأسئلة</h2>
<textarea id="bulkInput" rows="8" placeholder="الصق الأسئلة هنا"></textarea><br>
<button onclick="importQuestions()">إضافة الأسئلة</button>

<hr>

<h2>🧠 الاختبار</h2>
<button onclick="startQuiz()">ابدأ الاختبار</button>

<div id="quiz"></div>

</div>

<script src="script.js"></script>
</body>
</html>
