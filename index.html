<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الذكاء الاصطناعي في الهندسة المدنية</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1a2f;
    color:white;
    text-align:center;
}
header {
    background:#112240;
    padding:20px;
    font-size:24px;
}
.card {
    background:#1c2e4a;
    padding:15px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.card:hover {
    transform:scale(1.05);
    background:#243b63;
}
.programs {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}
img {
    width:100%;
    height:100px;
    object-fit:contain;
}
button {
    padding:10px;
    margin:10px;
    background:#00bcd4;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}
</style>

</head>
<body>

<header>
🎓 منصة الذكاء الاصطناعي في الهندسة المدنية
</header>

<!-- تسجيل الدخول -->
<div id="login">
<h2>🔐 تسجيل الدخول</h2>

<input id="email" placeholder="الايميل"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">تسجيل دخول</button>

</div>

<!-- لوحة -->
<div id="dashboard" style="display:none;">

<h2>👋 مرحبًا بك</h2>

<div class="programs">

<div class="card" onclick="showProgram('autocad')">
<img src="AutoCAD logo.png">
<p>AutoCAD</p>
</div>

<div class="card" onclick="showProgram('civil3d')">
<img src="Civil 3D logo.png">
<p>Civil 3D</p>
</div>

<div class="card" onclick="showProgram('revit')">
<img src="Revit logo.png">
<p>Revit</p>
</div>

<div class="card" onclick="showProgram('sap2000')">
<img src="SAP2000 logo.png">
<p>SAP2000</p>
</div>

</div>

<div id="details"></div>

<button onclick="logout()">تسجيل خروج</button>

</div>

<!-- 🔥 Firebase + JS -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "🔥 حط API KEY هنا",
  authDomain: "🔥 حط domain هنا",
  projectId: "🔥 حط projectId هنا"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// إنشاء حساب
window.register = function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("تم إنشاء الحساب ✅");
})
.catch(e=>{
alert(e.message);
});
}

// تسجيل دخول
window.login = function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
})
.catch(e=>{
alert("خطأ: "+e.message);
});
}

// تسجيل خروج
window.logout = function(){
signOut(auth).then(()=>{
location.reload();
});
}

</script>

<!-- البرامج -->
<script>

function showProgram(name){

let data = {

autocad: `
<h3>AutoCAD</h3>
<p>برنامج رسم هندسي ثنائي وثلاثي الأبعاد.</p>
<p>🤖 الذكاء الاصطناعي يساعد في تسريع التصميم.</p>
<a href="https://www.autodesk.com" target="_blank">
<button>تحميل البرنامج</button></a>`,

civil3d: `
<h3>Civil 3D</h3>
<p>تصميم الطرق والبنية التحتية.</p>
<p>🤖 تحليل التضاريس بالذكاء الاصطناعي.</p>
<a href="https://www.autodesk.com" target="_blank">
<button>تحميل البرنامج</button></a>`,

revit: `
<h3>Revit</h3>
<p>نمذجة معلومات المباني BIM.</p>
<p>🤖 تصميم ذكي وتحليل تلقائي.</p>
<a href="https://www.autodesk.com" target="_blank">
<button>تحميل البرنامج</button></a>`,

sap2000: `
<h3>SAP2000</h3>
<p>تحليل إنشائي متقدم.</p>
<p>🤖 تحليل الأحمال باستخدام AI.</p>
<a href="https://www.csiamerica.com" target="_blank">
<button>تحميل البرنامج</button></a>`

};

document.getElementById("details").innerHTML=data[name];

}

</script>

</body>
</html>
