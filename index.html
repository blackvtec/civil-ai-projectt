<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة الهندسة المدنية</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎓 منصة الذكاء الاصطناعي في الهندسة المدنية</h1>

<div id="loginBox">
<h2>تسجيل الدخول</h2>

<input id="email" placeholder="الايميل"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>

<p id="msg"></p>
</div>

<div id="dashboard" style="display:none;">
<h2>📊 مرحبًا بك</h2>

<h3>💻 البرامج</h3>

<div class="card" onclick="showInfo('autocad')">AutoCAD</div>
<div class="card" onclick="showInfo('civil')">Civil 3D</div>
<div class="card" onclick="showInfo('revit')">Revit</div>

<div id="infoBox"></div>

<button onclick="logout()">تسجيل خروج</button>
</div>

<script src="script.js"></script>

</body>
</html>
